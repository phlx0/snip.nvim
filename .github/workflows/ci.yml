name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs:
    name: Vimdoc tags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Generate helptags
        run: nvim --headless -c "helptags doc/" -c "quit"

      - name: Check doc/tags is committed
        run: |
          if git diff --exit-code doc/tags; then
            echo "doc/tags is up to date"
          else
            echo "doc/tags is out of date — run ':helptags doc/' and commit the result"
            exit 1
          fi
